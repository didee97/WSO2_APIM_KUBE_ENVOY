apiVersion: apps/v1
kind: Deployment
metadata:
  name: wso2-is-identity-server
  namespace: wso2-is
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: wso2-is
      app.kubernetes.io/name: identity-server
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: wso2-is
        app.kubernetes.io/name: identity-server
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - identity-server
                - key: app.kubernetes.io/instance
                  operator: In
                  values:
                  - wso2-is
              topologyKey: topology.kubernetes.io/zone
            weight: 100
      containers:
      - env:
        - name: NODE_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: JVM_MEM_OPTS
          value: -Xms2048m -Xmx2048m
        - name: JAVA_OPTS
          value: -Djdk.tls.ephemeralDHKeySize=2048 -Djdk.tls.rejectClientInitiatedRenegotiation=true
            -Dhttpclient.hostnameVerifier=Strict -Djdk.tls.client.protocols=TLSv1.2
            -Djava.util.prefs.systemRoot=/home/wso2carbon/.java -Djava.util.prefs.userRoot=/home/wso2carbon/.java/.userPrefs
        image: wso2/wso2is:7.2.0
        imagePullPolicy: Always
        lifecycle:
          preStop:
            exec:
              command:
              - sh
              - -c
              - |
                echo "Pre stop hook triggered"; sleep 10; echo "Shutdown server"; ${WSO2_SERVER_HOME}/bin/wso2server.sh stop
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /oauth2/token/.well-known/openid-configuration
            port: 9443
            scheme: HTTPS
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: wso2is
        ports:
        - containerPort: 9443
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/health-check/v1.0/health
            port: 9443
            scheme: HTTPS
          initialDelaySeconds: 60
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: "3"
            memory: 4Gi
          requests:
            cpu: "2"
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - all
          readOnlyRootFilesystem: false
          runAsNonRoot: true
        startupProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - nc -z localhost 9443
          failureThreshold: 30
          initialDelaySeconds: 60
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /home/wso2carbon/wso2-config-volume/repository/conf/deployment.toml
          name: wso2-is-identity-server-deployment-toml
          subPath: deployment.toml
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 40
      volumes:
      - configMap:
          defaultMode: 420
          name: wso2-is-identity-server-deployment-toml
        name: wso2-is-identity-server-deployment-toml
