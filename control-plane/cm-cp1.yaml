apiVersion: v1
kind: ConfigMap
metadata:
  name: apim-wso2am-acp-conf-1
  namespace: wso2-cp
data:
  deployment.toml: |
    [server]
    hostname = "apim.example.com"
    node_ip = "$env{NODE_IP}"
    offset = 0
    base_path = "${carbon.protocol}://${carbon.host}:${carbon.management.port}"
    #discard_empty_caches = false
    server_role = "control-plane"

    [user_store]
    type = "database_unique_id"
    key = "value"

    [super_admin]
    username = "admin"
    password = "admin"
    create_admin_account = true

    [database.shared_db]
    type = "mysql"
    url = "jdbc:mysql://<DB_URL>:3306/WSO2AM_SHARED_DB?useSSL=false&amp;allowPublicKeyRetrieval=true"
    username = "wso2carbon"
    password = "wso2carbon"
    driver = "com.mysql.cj.jdbc.Driver"

    [database.shared_db.pool_options]
    defaultAutoCommit = "true"
    maxActive = "100"
    maxWait = "60000"
    minIdle = "5"
    testOnBorrow = "true"
    testWhileIdle = "true"
    validationInterval = "30000"

    [database.apim_db]
    type = "mysql"
    url = "jdbc:mysql://<DB_URL>:3306/WSO2AM_DB?useSSL=false&amp;allowPublicKeyRetrieval=true"
    username = "wso2carbon"
    password = "wso2carbon"
    driver = "com.mysql.cj.jdbc.Driver"

    [database.apim_db.pool_options]
    defaultAutoCommit = "true"
    maxActive = "100"
    maxWait = "60000"
    minIdle = "5"
    testOnBorrow = "true"
    testWhileIdle = "true"
    validationInterval = "30000"

    [database.local]
    url = "jdbc:h2:./repository/database/WSO2CARBON_DB;DB_CLOSE_ON_EXIT=FALSE"

    [apim]
    gateway_type = "Regular,APK,AWS,Azure,Kong"

    [keystore.tls]
    type = "JKS"
    file_name = "wso2carbon.jks"
    alias = "wso2carbon"
    password = "wso2carbon"
    key_password = "wso2carbon"

    [truststore]
    type = "JKS"
    file_name = "client-truststore.jks"
    password = "wso2carbon"

    [[apim.gateway.environment]]
    name = "Internal"
    type = "hybrid"
    gateway_type = "Regular"
    provider = "wso2"
    display_in_api_console = true
    description = "This is a hybrid gateway that handles both production and sandbox token traffic."
    show_as_token_endpoint_url = true
    service_url = "https://apim-gw-wso2am-universal-gw-service.wso2-internal-gw:9443/services/"
    username= "${admin.username}"
    password= "${admin.password}"
    ws_endpoint = "ws://websocket.local"
    wss_endpoint = "wss://websocket.local"
    http_endpoint = "http://internal-gw.example.com"
    https_endpoint = "https://internal-gw.example.com"
    websub_event_receiver_http_endpoint = "http://websub.local"
    websub_event_receiver_https_endpoint = "https://websub.local"

    [[apim.gateway.environment]]
    name = "External"
    type = "hybrid"
    gateway_type = "Regular"
    provider = "wso2"
    display_in_api_console = true
    description = "This is a hybrid gateway that handles both production and sandbox token traffic."
    show_as_token_endpoint_url = true
    service_url = "https://apim-gw-wso2am-universal-gw-service.wso2-external-gw:9443/services/"
    username= "${admin.username}"
    password= "${admin.password}"
    ws_endpoint = "ws://websocket.local"
    wss_endpoint = "wss://websocket.local"
    http_endpoint = "http://external-gw.example.com"
    https_endpoint = "https://external-gw.example.com"
    websub_event_receiver_http_endpoint = "http://websub.local"
    websub_event_receiver_https_endpoint = "https://websub.local"

    [apim.sync_runtime_artifacts.gateway]
    gateway_labels = ["Internal, External"]

    [apim.key_manager]
    service_url = "https://apim-wso2am-acp-service.wso2-cp:9443/services/"
    username= "$ref{super_admin.username}"
    password= "$ref{super_admin.password}"
    enable_lightweight_apikey_generation = true
    allow_subscription_validation_disabling = true

    [oauth.endpoints]
    oauth2_jwks_url = "https://apim-wso2am-acp-service.wso2-cp:9443/oauth2/jwks/"

    [apim.publisher]
    enable_api_doc_visibility = false

    [apim.devportal]
    url = "https://apim.example.com/devportal"
    mode = "HYBRID"

    [apim.event_hub]
    enable = true
    username = "$ref{super_admin.username}"
    password = "$ref{super_admin.password}"
    service_url = "https://apim-wso2am-acp-service:9443/services/"
    event_listening_endpoints = ["tcp://localhost:5672"]
    event_duplicate_url = ["tcp://apim-wso2am-acp-2-service:5672"]

    [apim.ai]
    enable = false

    [apim.mcp]
    enable = false

    [apim.cache.gateway_token]
    enable = true
    expiry_time = "15m"

    [apim.cache.resource]
    enable = true
    expiry_time = "900s"

    [apim.cache.km_token]
    enable = true
    expiry_time = "15m"

    [apim.cache.jwt_claim]
    enable = true
    expiry_time = "15m"

    [apim.cache.tags]
    enable = true
    expiry_time = "2m"

    [oauth.grant_type.token_exchange]
    enable = true
    allow_refresh_tokens = true
    iat_validity_period = "1h"

    [apim.oauth_config]
    remove_outbound_auth_header = true
    auth_header = "Authorization"
    revoke_endpoint = ""
    enable_token_encryption = false
    enable_token_hashing = false

    [transport.https.properties]
    proxyPort = 443

    [service_provider]
    sp_name_regex = "^[\\sa-zA-Z0-9._-]*$"

    [apim.sdk]
    supported_languages = ["android","java","csharp","dart","groovy","javascript","jmeter","perl","php","python","ruby","swift5","clojure"]

    [apim.transaction_counter]
    enable = false

    [apim.organization_based_access_control]
    enable = true
    organization_name_local_claim = "http://wso2.org/claims/organization"
    organization_id_local_claim = "http://wso2.org/claims/organizationId"

    [apim.gateway_notification.cleanup]
    expiry_time = "2m"
    data_retention_period = "30d"

    [apim.throttling]
    event_duplicate_url = ["tcp://apim-wso2am-acp-2-service:5672"]
    throttle_decision_endpoints = ["tcp://localhost:5672"]

    [[apim.throttling.url_group]]
    traffic_manager_urls = ["tcp://apim-wso2am-acp-1-service:9611"]
    traffic_manager_auth_urls = ["ssl://apim-wso2am-acp-1-service:9711"]
    type = "loadbalance"

    [[apim.throttling.url_group]]
    traffic_manager_urls = ["tcp://apim-wso2am-acp-2-service:9611"]
    traffic_manager_auth_urls = ["ssl://apim-wso2am-acp-2-service:9711"]
    type = "loadbalance"

    [[apim.event_hub.publish.url_group]]
    urls = ["tcp://apim-wso2am-acp-1-service:9611"]
    auth_urls = ["ssl://apim-wso2am-acp-1-service:9711"]

    [[apim.event_hub.publish.url_group]]
    urls = ["tcp://apim-wso2am-acp-2-service:9611"]
    auth_urls = ["ssl://apim-wso2am-acp-2-service:9711"]

    [[event_handler]]
    name="userPostSelfRegistration"
    subscriptions=["POST_ADD_USER"]

    [[event_listener]]
    id = "token_revocation"
    type = "org.wso2.carbon.identity.core.handler.AbstractIdentityHandler"
    name = "org.wso2.is.notification.ApimOauthEventInterceptor"
    order = 1
    [event_listener.properties]
    notification_endpoint = "https://apim-wso2am-acp-service:${mgt.transport.https.port}/internal/data/v1/notify"
    username = "${admin.username}"
    password = "${admin.password}"
    'header.X-WSO2-KEY-MANAGER' = "default"
