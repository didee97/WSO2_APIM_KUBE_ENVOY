apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: apim-route
  namespace: wso2-cp
spec:
  parentRefs:
    - name: wso2-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "apim.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
      - group: gateway.envoyproxy.io
        kind: Backend
        name: apim-backend
        port: 9443
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: apim-backend
  namespace: wso2-cp
spec:
  type: Endpoints
  endpoints:
  - fqdn:
      hostname: apim-wso2am-acp-service.wso2-cp.svc.cluster.local
      port: 9443
  tls:
    insecureSkipVerify: true

