apiVersion: apps/v1
kind: Deployment
metadata:
  name: apim-wso2am-acp-deployment-2
  namespace: wso2-cp
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      deployment: apim-wso2am-acp
      node: apim-wso2am-acp-2
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        deployment: apim-wso2am-acp
        node: apim-wso2am-acp-2
        product: apim
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: deployment
                  operator: In
                  values:
                  - apim-wso2am-acp
              topologyKey: topology.kubernetes.io/zone
            weight: 100
      containers:
      - env:
        - name: PROFILE_NAME
          value: default
        - name: NODE_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: JVM_MEM_OPTS
          value: -Xms2048m -Xmx2048m
        image: docker.io/bimdevops/wso2-apim-acp-mysql@sha256:7ff3df14bfc8e80782a756a9a8a001542e1872a5cdb418389081db0214a65333
        imagePullPolicy: IfNotPresent
        lifecycle:
          preStop:
            exec:
              command:
              - sh
              - -c
              - |
                echo "Pre stop hook triggered"; sleep 10; echo "Shutdown APIM Server"; ${WSO2_SERVER_HOME}/bin/api-cp.sh stop
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /services/Version
            port: 9763
            scheme: HTTP
          initialDelaySeconds: 120
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: wso2am-control-plane
        ports:
        - containerPort: 9763
          protocol: TCP
        - containerPort: 9443
          protocol: TCP
        - containerPort: 9711
          protocol: TCP
        - containerPort: 9611
          protocol: TCP
        - containerPort: 5672
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /services/Version
            port: 9763
            scheme: HTTP
          initialDelaySeconds: 120
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: "3"
            memory: 3Gi
          requests:
            cpu: "2"
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 10001
        startupProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - timeout 1 bash -c "</dev/tcp/localhost/9443"
          failureThreshold: 3
          initialDelaySeconds: 120
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /home/wso2carbon/wso2-config-volume/repository/conf/deployment.toml
          name: wso2am-control-plane-conf
          subPath: deployment.toml
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 263
          name: apim-wso2am-acp-conf-2
        name: wso2am-control-plane-conf
