apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: internal-gw-route
  namespace: wso2-internal-gw
spec:
  parentRefs:
    - name: wso2-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "internal-gw.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: apim-gw-wso2am-universal-gw-service
          port: 8243
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: internal-gw-backend-tls
  namespace: wso2-internal-gw
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: apim-gw-wso2am-universal-gw-service
  validation:
    hostname: "localhost"
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: wso2-ca-cert
